name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "When I press button 6, the app crashes instead of typing text."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "Button 6 should paste 'Hello world' into the active window."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Assign textSnippet to button 6
        2. Open Notepad
        3. Press button 6
        4. App crashes
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sidearm version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: build
    attributes:
      label: Build type
      options:
        - Portable (.exe)
        - Dev (cargo tauri dev)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output (if available)
      description: "Paste relevant lines from `%LOCALAPPDATA%\\com.sidearm.desktop\\logs\\Sidearm.log`"
      render: text
