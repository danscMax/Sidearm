name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or frustration.
      placeholder: "I often need to switch between 3 apps and each needs different shortcuts..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this working?
      placeholder: "Add a 'quick switch' menu that shows all profiles and lets me switch manually."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought of?

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Button mapping / actions
        - Profiles / auto-switching
        - Macros / sequences
        - UI / visual
        - Diagnostics / logging
        - Build / installation
        - Other
    validations:
      required: true
