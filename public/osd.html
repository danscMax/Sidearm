<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #141812;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .osd {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: #141812;
    border: 1px solid rgba(159, 202, 105, 0.3);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8eae4;
    animation: osd-in 200ms ease-out;
  }
  .osd__label {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    color: rgba(159, 202, 105, 0.9);
  }
  .osd__name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  @keyframes osd-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="osd" id="osd">
  <span class="osd__label">Профиль:</span>
  <span class="osd__name" id="profile-name"></span>
</div>
<script src="/osd.js"></script>
</body>
</html>
