<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #1a1f16;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .osd {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #1a1f16;
    font-family: "Segoe UI", sans-serif;
    font-size: 12px;
    color: #e8eae4;
    opacity: 0;
    white-space: nowrap;
  }
  .osd__label {
    font-weight: 500;
    white-space: nowrap;
    color: rgba(159, 202, 105, 0.85);
  }
  .osd__name {
    font-weight: 700;
    white-space: nowrap;
  }
  /* Animation classes */
  .osd--slide-in {
    animation: osd-slide 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .osd--fade-in {
    animation: osd-fade 600ms ease-out forwards;
  }
  .osd--none {
    opacity: 1;
  }
  /* Font size classes */
  .osd--font-small  { font-size: 11px; }
  .osd--font-medium { font-size: 12px; }
  .osd--font-large  { font-size: 14px; }
  @keyframes osd-slide {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes osd-fade {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="osd" id="osd">
  <span class="osd__label">Профиль:</span>
  <span class="osd__name" id="profile-name"></span>
</div>
<script src="/osd.js"></script>
</body>
</html>
